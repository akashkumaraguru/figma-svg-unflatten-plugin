<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG Path Splitter</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Prevent text selection */
    body { user-select: none; }
    
    /* Animations */
    @keyframes pop {
      0%   { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop { animation: pop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  </style>
</head>
<body class="w-[340px] h-[420px] overflow-hidden bg-slate-50 text-slate-900 font-sans">
  
  <div class="h-full flex flex-col p-5 gap-4">
    
    <!-- Header -->
    <header class="flex items-center gap-3">
      <div class="w-10 h-10 flex-shrink-0 bg-white rounded-xl border border-slate-200 shadow-sm flex items-center justify-center text-blue-600">
        <i data-lucide="scissors" stroke-width="2.5" class="w-5 h-5"></i>
      </div>
      <div>
        <h1 class="text-[15px] font-bold tracking-tight text-slate-900 leading-tight">Path Splitter</h1>
        <p class="text-[12px] text-slate-500 leading-tight">Convert vectors to editable layers</p>
      </div>
    </header>

    <div class="h-px bg-slate-200 w-full rounded-full"></div>

    <!-- Instructions -->
    <div class="bg-white border border-slate-200 rounded-xl p-4 shadow-sm">
      <h2 class="text-[10px] font-bold tracking-wider uppercase text-blue-600 mb-3">How it works</h2>
      <div class="flex flex-col gap-2.5">
        <div class="flex items-start gap-2.5 text-xs text-slate-600 leading-relaxed">
          <div class="w-5 h-5 rounded-md bg-blue-50 border border-blue-100 text-[10px] font-bold text-blue-600 flex items-center justify-center flex-shrink-0 mt-0.5">1</div>
          <span>Select a <strong class="text-slate-900 font-semibold">flattened vector</strong> / SVG.</span>
        </div>
        <div class="flex items-start gap-2.5 text-xs text-slate-600 leading-relaxed">
          <div class="w-5 h-5 rounded-md bg-blue-50 border border-blue-100 text-[10px] font-bold text-blue-600 flex items-center justify-center flex-shrink-0 mt-0.5">2</div>
          <span>Click <strong class="text-slate-900 font-semibold">"Convert Paths"</strong> below.</span>
        </div>
        <div class="flex items-start gap-2.5 text-xs text-slate-600 leading-relaxed">
          <div class="w-5 h-5 rounded-md bg-blue-50 border border-blue-100 text-[10px] font-bold text-blue-600 flex items-center justify-center flex-shrink-0 mt-0.5">3</div>
          <span>Get isolated <strong class="text-slate-900 font-semibold">vector layers</strong> organized in a group.</span>
        </div>
      </div>
    </div>

    <!-- Status Area -->
    <div id="statusArea" class="bg-white border border-slate-200 rounded-xl p-3.5 min-h-[68px] flex items-center gap-3 shadow-sm transition-colors duration-200">
      <div id="statusIcon" class="flex-shrink-0 text-slate-400">
        <i data-lucide="mouse-pointer" class="w-6 h-6"></i>
      </div>
      <div id="statusText" class="text-xs text-slate-600 leading-relaxed">
        Select a vector node in Figma, then start splitting.
      </div>
    </div>

    <!-- Actions -->
    <div class="mt-auto flex gap-2.5">
      <button id="cancelBtn" class="flex-1 py-2.5 px-4 bg-white border border-slate-200 text-slate-700 font-semibold text-[13px] rounded-lg hover:bg-slate-50 hover:text-slate-900 active:scale-95 transition-all">
        Close
      </button>
      <button id="convertBtn" class="flex-[2] py-2.5 px-4 bg-blue-600 text-white font-semibold text-[13px] rounded-lg hover:bg-blue-700 hover:shadow-md active:scale-95 transition-all flex items-center justify-center gap-1.5 disabled:opacity-50 disabled:cursor-not-allowed">
        <i data-lucide="scissors" class="w-4 h-4"></i>
        Convert Paths
      </button>
    </div>

    <!-- Footer -->
    <div class="text-center text-[10px] text-slate-400 mt-1">
      Powered by Figma Plugin API
    </div>

  </div>

  <script>
    // Initialize Lucide icons on load
    lucide.createIcons();

    // ── DOM refs ───────────────────────────────────────────────
    const convertBtn  = document.getElementById('convertBtn');
    const cancelBtn   = document.getElementById('cancelBtn');
    const statusArea  = document.getElementById('statusArea');
    const statusIcon  = document.getElementById('statusIcon');
    const statusText  = document.getElementById('statusText');

    // ── Helpers ────────────────────────────────────────────────
    function setStatus(state, iconName, message, badge) {
      // Base styles for the status container
      statusArea.className = 'border rounded-xl p-3.5 min-h-[68px] flex items-center gap-3 shadow-sm transition-colors duration-200';
      
      if (state === 'is-working') {
        statusArea.classList.add('bg-blue-50', 'border-blue-200');
        statusIcon.className = 'flex-shrink-0 text-blue-500';
        statusIcon.innerHTML = `<i data-lucide="${iconName}" class="w-6 h-6 animate-spin"></i>`;
        statusText.className = 'text-xs text-blue-700 leading-relaxed';
      } else if (state === 'is-success') {
        statusArea.classList.add('bg-emerald-50', 'border-emerald-200');
        statusIcon.className = 'flex-shrink-0 text-emerald-500 pop';
        statusIcon.innerHTML = `<i data-lucide="${iconName}" class="w-6 h-6"></i>`;
        statusText.className = 'text-xs text-emerald-700 leading-relaxed';
      } else if (state === 'is-error') {
        statusArea.classList.add('bg-red-50', 'border-red-200');
        statusIcon.className = 'flex-shrink-0 text-red-500 pop';
        statusIcon.innerHTML = `<i data-lucide="${iconName}" class="w-6 h-6"></i>`;
        statusText.className = 'text-xs text-red-600 leading-relaxed';
      } else {
        // Idle
        statusArea.classList.add('bg-white', 'border-slate-200');
        statusIcon.className = 'flex-shrink-0 text-slate-400 pop';
        statusIcon.innerHTML = `<i data-lucide="${iconName}" class="w-6 h-6"></i>`;
        statusText.className = 'text-xs text-slate-600 leading-relaxed';
      }

      let badgeHtml = '';
      if (badge) {
        badgeHtml = `<br/><span class="inline-flex items-center gap-1 mt-1.5 px-2 py-0.5 bg-emerald-100 border border-emerald-200 rounded-full text-[10px] font-bold text-emerald-700">
            <i data-lucide="check" class="w-3 h-3"></i> ${badge}
          </span>`;
      }

      statusText.innerHTML = message + badgeHtml;

      // Re-trigger Lucide to parse the new generic <i> tag
      lucide.createIcons();
    }

    function setConverting(enabled) {
      convertBtn.disabled = !enabled;
      if (enabled) {
        convertBtn.innerHTML = `<i data-lucide="scissors" class="w-4 h-4"></i> Convert Paths`;
      } else {
        convertBtn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Converting...`;
      }
      lucide.createIcons();
    }

    // ── Button listeners ───────────────────────────────────────
    convertBtn.addEventListener('click', () => {
      setStatus('is-working', 'loader', 'Starting conversion...');
      setConverting(false);
      parent.postMessage({ pluginMessage: { type: 'convert' } }, '*');
    });

    cancelBtn.addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    });

    // ── Messages from plugin ───────────────────────────────────
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      switch (msg.type) {
        case 'progress':
          setStatus('is-working', 'loader', msg.message);
          break;

        case 'success':
          setStatus(
            'is-success',
            'check-circle',
            `Successfully split into <strong class="font-semibold text-emerald-800">${msg.count} editable paths</strong>. They're grouped for you.`,
            `${msg.count} paths isolated`
          );
          setConverting(true);
          break;

        case 'error':
          setStatus('is-error', 'x-circle', msg.message);
          setConverting(true);
          break;

        case 'info':
          if (msg.isSingle) {
            setStatus(null, 'sparkles',
              `Vector with <strong class="font-semibold text-slate-900">${msg.subPathCount} sub-paths</strong> pending split.`
            );
          }
          break;
      }
    };
  </script>
</body>
</html>
